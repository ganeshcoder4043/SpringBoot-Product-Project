#mysql Databases

# ------------------------
# Database Configuration
# ------------------------
spring.datasource.name=springbootproductprojects
spring.datasource.url=jdbc:mysql://localhost:3306/springbootproductprojects
spring.datasource.username=root
spring.datasource.password=Ganesh@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dialect = Hibernate ko batata hai ki kaunsi database grammar use karni hai
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ------------------------
# JPA / Hibernate Configuration
# ------------------------
# Hibernate ko table structure manage karne ke liye
#table ko update karega na ki har bar table create karega
spring.jpa.hibernate.ddl-auto=update 

# Console me SQL queries dikhane ke liye
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true     

